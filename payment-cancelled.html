<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled | WME Agency</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
      <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-times text-yellow-600 text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold mb-2">Payment Cancelled</h1>
      <p class="text-gray-600 mb-6">Your payment was not completed. You can try again anytime.</p>
      <a href="javascript:history.back()" class="inline-block bg-black text-white px-6 py-3 rounded-xl font-semibold hover:bg-black/90 transition w-full mb-3">
        Try Again
      </a>
      <a href="app/bookings.html" class="inline-block bg-gray-200 text-black px-6 py-3 rounded-xl font-semibold hover:bg-gray-300 transition w-full">
        View My Bookings
      </a>
    </div>
  </div>
</body>
</html>
