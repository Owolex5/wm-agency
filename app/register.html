<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Create Account | WME Agency</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body{font-family:'Inter',sans-serif;background:#FAF9F6}

.toast-message {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.spinner {
  animation: spin 1s linear infinite;
  display: inline-block;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body class="antialiased text-black">

<div class="min-h-screen flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md">

<div class="mb-8 text-center">
<a href="#" class="inline-flex items-center gap-2 font-bold text-xl tracking-tight">
<div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
<span class="text-white text-[10px] font-black">WME</span>
</div>
WME AGENCY
</a>
</div>

<div class="text-center mb-10">
<h1 class="text-3xl font-bold uppercase tracking-tight mb-3">Create Account</h1>
<p class="text-black/60 text-sm">Join WME to access exclusive celebrity talent.</p>
</div>

<form id="registerForm" class="space-y-4">

<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Full Name</label>
<div class="relative">
<i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
<input type="text" id="regName" required placeholder="John Doe"
class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black focus:outline-none focus:ring-1 focus:ring-black">
</div>
</div>

<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Email</label>
<div class="relative">
<i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
<input type="email" id="regEmail" required placeholder="you@example.com"
class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black focus:outline-none focus:ring-1 focus:ring-black">
</div>
</div>

<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Phone</label>
<div class="relative">
<i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
<input type="tel" id="regPhone" required placeholder="+1 (555) 000-0000"
class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black focus:outline-none focus:ring-1 focus:ring-black">
</div>
</div>

<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Password</label>
<div class="relative">
<i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
<input type="password" id="regPassword" required placeholder="•••••••• (min 6 characters)"
class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black focus:outline-none focus:ring-1 focus:ring-black">
</div>
</div>

<button type="submit" id="submitBtn"
class="w-full bg-black text-white py-4 rounded-xl text-xs font-bold uppercase tracking-[0.2em] hover:bg-black/90 transition-all flex items-center justify-center gap-2">
Create Account
</button>

</form>

<p class="mt-8 text-center text-sm text-black/60">
Already have an account?
<a href="login.html" class="text-black font-bold hover:underline">Sign in</a>
</p>

</div>
</div>

<div id="toastContainer"></div>

<script>

const SUPABASE_URL = 'https://becpujqyjjlezgibmdfk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_MA-ivarGoHmTWsVgoodPvA_bKq0Wihs';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const bgColor = type === 'success' ? 'bg-black' : type === 'error' ? 'bg-red-600' : 'bg-orange-500';
  toast.className = `toast-message ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg text-sm`;
  toast.innerHTML = `<div class="flex items-center gap-3"><i class="fa-${type === 'success' ? 'regular fa-circle-check' : 'regular fa-circle-xmark'}"></i><span>${message}</span></div>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("regName").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const phone = document.getElementById("regPhone").value.trim();
  const password = document.getElementById("regPassword").value;

  // Validation
  if (!name || !email || !phone || !password) {
    showToast("Please fill in all fields", "error");
    return;
  }

  if (password.length < 6) {
    showToast("Password must be at least 6 characters", "error");
    return;
  }

  if (!email.includes('@')) {
    showToast("Please enter a valid email address", "error");
    return;
  }

  const submitBtn = document.getElementById("submitBtn");
  const originalText = submitBtn.innerHTML;
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch spinner"></i> Creating Account...';

  try {
    // 1. Sign up with Supabase Auth
    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password,
      options: {
        data: {
          full_name: name,
          phone: phone
        }
      }
    });

    if (error) {
      console.error("Signup error:", error);
      showToast(error.message, "error");
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
      return;
    }

    if (!data.user) {
      showToast("Signup failed. Please try again.", "error");
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
      return;
    }

    // 2. Create profile in profiles table
    const { error: profileError } = await supabase
      .from("profiles")
      .insert([{
        id: data.user.id,
        full_name: name,
        email: email,
        phone: phone,
        points: 100,
        balance: 0,
        role: 'user',
        created_at: new Date().toISOString()
      }]);

    if (profileError) {
      console.error("Profile creation error:", profileError);
      showToast("Account created but profile setup had issues. Please contact support.", "warning");
    } else {
      showToast("Account created successfully! Redirecting to login...", "success");
    }

    // 3. Redirect to login page after 2 seconds
    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);

  } catch (err) {
    console.error("Unexpected error:", err);
    showToast("An unexpected error occurred. Please try again.", "error");
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalText;
  }
});

</script>

</body>
</html>
