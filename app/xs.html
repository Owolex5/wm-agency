<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | WME Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FAF9F6; }
        .form-container { transition: all 0.4s ease-in-out; }
        .hidden-form { display: none; }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="antialiased text-black">

    <div class="min-h-screen flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            
            <div class="mb-8 text-center">
                <a href="#" class="inline-flex items-center gap-2 font-bold text-xl tracking-tight">
                    <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
                        <span class="text-white text-[10px] font-black">WME</span>
                    </div>
                    WME AGENCY
                </a>
            </div>

            <div id="loginSection" class="form-container">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-bold uppercase tracking-tight mb-3">Sign In</h1>
                    <p class="text-black/60 text-sm">Welcome back! Sign in to access your dashboard.</p>
                </div>

                <form id="loginForm" class="space-y-5">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold uppercase tracking-wider text-black/50">Email Address</label>
                        <div class="relative">
                            <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
                            <input type="email" id="loginEmail" required placeholder="you@example.com" class="w-full pl-11 pr-4 py-3.5 bg-white border border-black/10 rounded-xl focus:border-black focus:ring-1 focus:ring-black outline-none transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-semibold uppercase tracking-wider text-black/50">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
                            <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full pl-11 pr-12 py-3.5 bg-white border border-black/10 rounded-xl focus:border-black focus:ring-1 focus:ring-black outline-none transition-all">
                            <button type="button" onclick="togglePass('loginPassword')" class="absolute right-4 top-1/2 -translate-y-1/2 text-black/30 hover:text-black">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-xs">
                        <label class="flex items-center gap-2 cursor-pointer text-black/60">
                            <input type="checkbox" id="rememberMe" class="rounded border-black/20 accent-black"> Remember me
                        </label>
                        <a href="#" onclick="resetPassword()" class="font-medium hover:underline">Forgot password?</a>
                    </div>

                    <button type="submit" class="w-full bg-black text-white py-4 rounded-xl text-xs font-bold uppercase tracking-[0.2em] hover:bg-black/80 transition-all flex items-center justify-center gap-2">
                        Sign In <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <p class="mt-8 text-center text-sm text-black/60">
                    Don't have an account? 
                    <button onclick="switchForm('register')" class="text-black font-bold hover:underline">Create one</button>
                </p>
            </div>

            <div id="registerSection" class="form-container hidden-form">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-bold uppercase tracking-tight mb-3">Create Account</h1>
                    <p class="text-black/60 text-sm">Join WME to access exclusive celebrity talent.</p>
                </div>

                <form id="registerForm" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Full Name</label>
                        <div class="relative">
                            <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
                            <input type="text" id="regName" required placeholder="John Doe" class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black outline-none">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Email</label>
                        <div class="relative">
                            <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
                            <input type="email" id="regEmail" required placeholder="you@example.com" class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black outline-none">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Phone</label>
                        <div class="relative">
                            <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
                            <input type="tel" id="regPhone" required placeholder="+1 (555) 000-0000" class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black outline-none">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-black/40">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-black/30"></i>
                            <input type="password" id="regPassword" required placeholder="•••••••• (min 6 characters)" class="w-full pl-11 pr-4 py-3 bg-white border border-black/10 rounded-xl focus:border-black outline-none">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full bg-black text-white py-4 rounded-xl text-xs font-bold uppercase tracking-[0.2em] hover:bg-black/80 transition-all flex items-center justify-center gap-2">
                            Create Account <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>

                <p class="mt-8 text-center text-sm text-black/60">
                    Already have an account? 
                    <button onclick="switchForm('login')" class="text-black font-bold hover:underline">Sign in</button>
                </p>
            </div>

            <div class="mt-12 p-4 bg-black/5 rounded-2xl border border-black/5">
                <p class="text-[10px] text-center text-black/40 leading-relaxed uppercase tracking-widest">
                    Authorized Access Only<br>
                    WME Agency Global Talent Relations
                </p>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        // ========== SUPABASE CONFIGURATION WITH YOUR CREDENTIALS ==========
        const SUPABASE_URL = 'https://becpujqyjjlezgibmdfk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_MA-ivarGoHmTWsVgoodPvA_bKq0Wihs';
        
        let supabase = null;
        
        // Initialize Supabase
        function initSupabase() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase initialized');
            return true;
        }
        
        // Show toast notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-message bg-${type === 'success' ? 'black' : type === 'error' ? 'red-600' : 'orange-500'} text-white px-6 py-3 rounded-xl shadow-lg text-sm`;
            toast.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fa-${type === 'success' ? 'regular fa-circle-check' : type === 'error' ? 'regular fa-circle-xmark' : 'regular fa-circle-exclamation'}"></i>
                    <span>${message}</span>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Toggle password visibility
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        // Switch between login and register forms
        function switchForm(type) {
            const login = document.getElementById('loginSection');
            const register = document.getElementById('registerSection');
            
            if (type === 'register') {
                login.classList.add('hidden-form');
                register.classList.remove('hidden-form');
            } else {
                register.classList.add('hidden-form');
                login.classList.remove('hidden-form');
            }
        }
        
        // Handle Login
        async function handleLogin(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                showToast(error.message, 'error');
                return false;
            }
            
            if (data.user) {
                // Fetch user profile from profiles table
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                
                if (profileError) {
                    console.error('Profile fetch error:', profileError);
                }
                
                // Store user data in localStorage
                const userData = {
                    id: data.user.id,
                    email: data.user.email,
                    full_name: profile?.full_name || data.user.user_metadata?.full_name || email.split('@')[0],
                    phone: profile?.phone || '',
                    points: profile?.points || 100,
                    rank: profile?.rank || 0,
                    role: profile?.role || 'user',
                    avatar: profile?.avatar_url || null
                };
                
                localStorage.setItem('wme_current_user', JSON.stringify(userData));
                localStorage.setItem('supabase_session', JSON.stringify(data.session));
                
                showToast('Welcome back! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                return true;
            }
            return false;
        }
        
        // Handle Registration
        async function handleRegister(name, email, phone, password) {
            // Sign up with Supabase
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name,
                        phone: phone
                    }
                }
            });
            
            if (error) {
                showToast(error.message, 'error');
                return false;
            }
            
            if (data.user) {
                // Create profile entry in profiles table
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([
                        {
                            id: data.user.id,
                            full_name: name,
                            email: email,
                            phone: phone,
                            points: 100,
                            role: 'user'
                        }
                    ]);
                
                if (profileError) {
                    console.error('Profile creation error:', profileError);
                    showToast('Account created but profile setup had issues. Please contact support.', 'warning');
                } else {
                    showToast('Account created successfully! Please check your email to confirm.', 'success');
                }
                
                setTimeout(() => switchForm('login'), 2000);
                return true;
            }
            return false;
        }
        
        // Reset password
        async function resetPassword() {
            const email = prompt('Enter your email address to reset password:');
            if (!email) return;
            
            const { error } = await supabase.auth.resetPasswordForEmail(email);
            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Password reset email sent! Check your inbox.', 'success');
            }
        }
        
        // Form submission handlers
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Processing...';
            
            await handleLogin(email, password);
            
            btn.disabled = false;
            btn.innerHTML = originalText;
        });
        
        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Creating...';
            
            await handleRegister(name, email, phone, password);
            
            btn.disabled = false;
            btn.innerHTML = originalText;
        });
        
        // Check if user is already logged in
        function checkSession() {
            const currentUser = localStorage.getItem('wme_current_user');
            const session = localStorage.getItem('supabase_session');
            
            if (currentUser && session && window.location.pathname.includes('login.html')) {
                window.location.href = 'index.html';
            } else if (!currentUser && !window.location.pathname.includes('login.html') && 
                       !window.location.pathname.includes('login')) {
                // If on a protected page and not logged in, redirect to login
                if (window.location.pathname !== '/' && !window.location.pathname.includes('login')) {
                    window.location.href = 'login.html';
                }
            }
        }
        
        // Initialize
        initSupabase();
        checkSession();
        
        // Expose functions globally
        window.switchForm = switchForm;
        window.togglePass = togglePass;
        window.resetPassword = resetPassword;
    </script>
</body>
</html>
